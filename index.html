<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AR Graph Demo</title>

    <!-- AFrame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

    <link rel="stylesheet" href="css/style.css" />

    <script src="js/app.js" defer></script>
  </head>

  <body>
    <div id="hud">
      <b>AR Demo</b>
      Point your camera at the <em>HIRO</em> marker.
      <div id="status">Status: waiting for marker…</div>
    </div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <a-marker preset="hiro" id="marker">
        
        <!-- Container -->
        <a-entity id="graph-root" position="0 0 0 0"></a-entity>

        <!-- Title text -->
        <a-text id="graph-title" value="" position="0 1.6 0" rotation="-90 0 0" align="center" color="white" width="4">
        </a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
