<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AR Graph Demo</title>

    <!-- AFrame -->
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>

    <!-- QR decoder -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

    <link rel="stylesheet" href="css/style.css" />

    <!-- App -->
    <script type="module" src="js/main.js"></script>
  </head>

  <body>
    <div id="hud" class="hud hud-closed">
      <div class="hud_header">
        <div class="hud_title">
          <b>AR Demo</b>
          Point your camera at the <em>HIRO</em> marker.
          <div id="status">Status: waiting for marker.</div>
        </div>

        <button class="hud_toggle" id="hudToggle" type="button" aria-expanded="false" aria-label="Show options">
          <span class="hud_chevron">▾</span>
        </button>
      </div>

      <div class="hud_options" id="hudOptions">
        <div class="row">
          <label for="exaggeration">Y-axis Exaggeration</label>
          <input id="exaggeration" type="range" min="0.5" max="3" step="0.1" value="1" />
          <span id="exaggerationValue">1.0x</span>
        </div>

        <div class="row">
          <label for="chartSize">Chart Size</label>
          <input id="chartSize" type="range" min="1" max="4" step="0.2" value="2" />
          <span id="chartSizeValue">2.0x</span>
        </div>

        <div class="row">
          <label for="graphColour">Graph Colour</label>
          <input type="color" id="graphColour" value="#FFFFFF" />
        </div>
      </div>

    </div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true"
      arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    >
      <a-marker preset="hiro" id="marker" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="5">

        <!-- Container -->
        <a-entity id="graph-root" position="0 0 0 0"></a-entity>

        <!-- Title text -->
        <a-text id="graph-title" value="" position="0 1.6 0" align="center" color="white" width="4">
        </a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
